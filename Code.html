<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Gratitude Card</title>
                <style>
                        body {
                                    background-color: #0d1117; /* GitHub Dark BG */
                                                color: #c9d1d9;
                                                            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                                                                        display: flex;
                                                                                    justify-content: center;
                                                                                                align-items: center;
                                                                                                            height: 100vh;
                                                                                                                        margin: 0;
                                                                                                                                }
                                                                                                                                        .thank-you-card {
                                                                                                                                                    background: #161b22;
                                                                                                                                                                border: 1px solid #30363d;
                                                                                                                                                                            border-radius: 12px;
                                                                                                                                                                                        padding: 40px;
                                                                                                                                                                                                    text-align: center;
                                                                                                                                                                                                                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                                                                                                                                                                                                                            max-width: 400px;
                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                            h1 {
                                                                                                                                                                                                                                                        color: #58a6ff; /* GitHub Blue */
                                                                                                                                                                                                                                                                    font-size: 2rem;
                                                                                                                                                                                                                                                                                margin-bottom: 10px;
                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                p {
                                                                                                                                                                                                                                                                                                            line-height: 1.6;
                                                                                                                                                                                                                                                                                                                        font-size: 1.1rem;
                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                        .highlight-goodwall {
                                                                                                                                                                                                                                                                                                                                                    color: #ff3b3f; /* Goodwall Red/Pink accent */
                                                                                                                                                                                                                                                                                                                                                                font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                .highlight-github {
                                                                                                                                                                                                                                                                                                                                                                                            color: #ffffff;
                                                                                                                                                                                                                                                                                                                                                                                                        font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                                                                    background: #238636; /* GitHub Green */
                                                                                                                                                                                                                                                                                                                                                                                                                                padding: 2px 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                            .heart {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: #f85149;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 1.5rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="thank-you-card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1>Hello World!</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>Big thanks to <span class="highlight-github">GitHub</span> for providing the tools to build and <span class="highlight-goodwall">Goodwall</span> for the inspiration to start.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <p>This is the first step toward my eCommerce agency! <span class="heart">❤</span></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div style="margin-top: 20px; font-size: 0.8rem; color: #8b949e;">#MyFirstCode Submission</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
